<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 180" width="100%" height="100%">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="sirenBackgroundGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(239, 68, 68, 0.6)" />
      <stop offset="100%" stop-color="rgba(239, 68, 68, 0)" />
    </radialGradient>
    
    <!-- Chrome base gradient (horizontal metallic bars) -->
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3f3f46" />
      <stop offset="6%" stop-color="#71717a" />
      <stop offset="12%" stop-color="#e4e4e7" />
      <stop offset="20%" stop-color="#ffffff" />
      <stop offset="28%" stop-color="#a1a1aa" />
      <stop offset="38%" stop-color="#27272a" />
      <stop offset="55%" stop-color="#52525b" />
      <stop offset="68%" stop-color="#e4e4e7" />
      <stop offset="78%" stop-color="#ffffff" />
      <stop offset="88%" stop-color="#71717a" />
      <stop offset="100%" stop-color="#27272a" />
    </linearGradient>

    <!-- Chrome shadow/reflection details -->
    <linearGradient id="chromeVertGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)" />
      <stop offset="15%" stop-color="rgba(255,255,255,0)" />
      <stop offset="85%" stop-color="rgba(0,0,0,0)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.65)" />
    </linearGradient>

    <!-- Black rubber ring base -->
    <linearGradient id="rubberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="15%" stop-color="#27272a" />
      <stop offset="50%" stop-color="#3f3f46" />
      <stop offset="85%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>

    <!-- Mirror backing reflector -->
    <radialGradient id="mirrorGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#991b1b" />
      <stop offset="50%" stop-color="#450a0a" />
      <stop offset="100%" stop-color="#180202" />
    </radialGradient>

    <!-- Glass dome base gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(153, 27, 27, 0.98)" />
      <stop offset="8%" stop-color="rgba(185, 28, 28, 0.95)" />
      <stop offset="28%" stop-color="rgba(220, 38, 38, 0.8)" />
      <stop offset="42%" stop-color="rgba(239, 68, 68, 0.55)" />
      <stop offset="50%" stop-color="rgba(254, 226, 226, 0.5)" />
      <stop offset="58%" stop-color="rgba(239, 68, 68, 0.55)" />
      <stop offset="72%" stop-color="rgba(220, 38, 38, 0.8)" />
      <stop offset="92%" stop-color="rgba(185, 28, 28, 0.95)" />
      <stop offset="100%" stop-color="rgba(127, 29, 29, 0.98)" />
    </linearGradient>

    <!-- Glass dome top cap radial gradient -->
    <radialGradient id="glassCapGrad" cx="50%" cy="25%" r="65%">
      <stop offset="0%" stop-color="rgba(254, 226, 226, 0.9)" />
      <stop offset="35%" stop-color="rgba(239, 68, 68, 0.95)" />
      <stop offset="75%" stop-color="rgba(185, 28, 28, 0.98)" />
      <stop offset="100%" stop-color="rgba(127, 29, 29, 1)" />
    </radialGradient>

    <!-- Inner lightbulb glowing radial gradient -->
    <radialGradient id="bulbGlowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="25%" stop-color="#ffedd5" />
      <stop offset="55%" stop-color="rgba(239, 68, 68, 0.9)" />
      <stop offset="100%" stop-color="rgba(239, 68, 68, 0)" />
    </radialGradient>

    <!-- Glass sheen / highlight gradient (vertical fade) -->
    <linearGradient id="sheenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.75)" />
      <stop offset="30%" stop-color="rgba(255,255,255,0.2)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
  </defs>

  <!-- 1. Ambient Background Pulse Glow -->
  <circle cx="80" cy="74" r="75" fill="url(#sirenBackgroundGlow)" />

  <!-- 2. Inner Assembly (Visible through translucent glass) -->
  <!-- Mirror Backing Plate -->
  <ellipse cx="80" cy="72" rx="35" ry="32" fill="url(#mirrorGrad)" stroke="#7f1d1d" stroke-width="1" />
  <!-- Mirror metal rim highlight -->
  <ellipse cx="80" cy="72" rx="34" ry="31" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" />
  
  <!-- Bulb Socket Base -->
  <path d="M 72 88 Q 80 90 88 88 L 86 102 Q 80 104 74 102 Z" fill="url(#chromeGrad)" />
  <path d="M 72 88 Q 80 90 88 88 L 86 102 Q 80 104 74 102 Z" fill="url(#chromeVertGrad)" />
  <!-- Socket collar details -->
  <ellipse cx="80" cy="88" rx="8" ry="1.5" fill="#52525b" />
  <ellipse cx="80" cy="91" rx="7.5" ry="1.2" fill="#27272a" />

  <!-- Filament / Glow Center -->
  <circle cx="80" cy="71" r="30" fill="url(#bulbGlowGrad)" opacity="0.9" />
  
  <!-- Bulb Glass Envelope -->
  <path d="M 73 88 C 70 82, 70 65, 80 65 C 90 65, 90 82, 87 88 Z" fill="rgba(255, 255, 255, 0.28)" stroke="rgba(255, 255, 255, 0.45)" stroke-width="0.75" />
  <!-- Bulb highlight -->
  <path d="M 75 75 C 73 70, 75 67, 80 66" fill="none" stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity="0.75" />

  <!-- 3. Outer Red Glass Dome -->
  <path d="M 33 112 L 36 44 C 36 24, 46 14, 80 14 C 114 14, 124 24, 124 44 L 127 112 Q 80 120 33 112 Z" fill="url(#glassGrad)" />
  <path d="M 33 112 L 36 44 C 36 24, 46 14, 80 14 C 114 14, 124 24, 124 44 L 127 112 Q 80 120 33 112 Z" fill="url(#glassCapGrad)" opacity="0.65" style="mix-blend-mode: multiply;" />

  <!-- 4. Glass Specular Highlights (Determines the Glossy/3D look) -->
  <!-- Left long reflection bar -->
  <path d="M 38 48 C 38 48, 41 106, 41 106 C 41 106, 46 107, 46 107 C 46 107, 43 48, 43 48 Z" fill="url(#sheenGrad)" opacity="0.68" />
  <!-- Left edge sub-reflection -->
  <path d="M 35 60 C 35 60, 37 100, 37 100" fill="none" stroke="#ffffff" stroke-width="0.75" opacity="0.38" />
  
  <!-- Right edge reflection bar -->
  <path d="M 122 48 C 122 48, 119 106, 119 106 C 119 106, 115 107, 115 107 C 115 107, 118 48, 118 48 Z" fill="url(#sheenGrad)" opacity="0.2" />

  <!-- Top left crescent highlight -->
  <path d="M 43 40 C 47 28, 59 22, 76 21 C 76 21, 74 24, 74 24 C 60 25, 50 30, 45 42 Z" fill="#ffffff" opacity="0.6" />
  <!-- Top right soft glare -->
  <ellipse cx="106" cy="32" rx="12" ry="5" transform="rotate(-15 106 32)" fill="#ffffff" opacity="0.18" />

  <!-- Internal glare reflection inside the glass -->
  <path d="M 44 95 Q 80 102 116 95 L 117 99 Q 80 106 43 99 Z" fill="#ffffff" opacity="0.2" />
  <path d="M 46 102 Q 80 108 114 102 L 115 104 Q 80 110 45 104 Z" fill="#ffffff" opacity="0.28" />

  <!-- 5. Chrome / Metal Base (Lower assembly) -->
  <!-- Upper metal collar collar plate -->
  <path d="M 33 112 Q 80 120 127 112 L 128 118 Q 80 126 32 118 Z" fill="url(#chromeGrad)" />
  <path d="M 33 112 Q 80 120 127 112 L 128 118 Q 80 126 32 118 Z" fill="url(#chromeVertGrad)" />
  
  <!-- Upper metal rim white highlight -->
  <path d="M 33 112 Q 80 120 127 112" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="0.75" />

  <!-- Middle thick torus-like ring -->
  <path d="M 32 118 C 32 118, 22 134, 22 138 C 22 144, 45 152, 80 152 C 115 152, 138 144, 138 138 C 138 134, 128 118, 128 118 Q 80 126 32 118 Z" fill="url(#chromeGrad)" />
  <path d="M 32 118 C 32 118, 22 134, 22 138 C 22 144, 45 152, 80 152 C 115 152, 138 144, 138 138 C 138 134, 128 118, 128 118 Q 80 126 32 118 Z" fill="url(#chromeVertGrad)" />

  <!-- Middle ring bright reflection flare -->
  <path d="M 22 138 Q 80 148 138 138" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="1.25" />
  <!-- Middle ring shadow gap -->
  <path d="M 20 146 Q 80 155 140 146" fill="none" stroke="rgba(0,0,0,0.45)" stroke-width="1.5" />

  <!-- Bottom Black Rubber Base Ring -->
  <path d="M 20 146 Q 80 155 140 146 L 141 155 Q 80 164 19 155 Z" fill="url(#rubberGrad)" />
  <path d="M 19 155 Q 80 164 141 155" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.75" />
</svg>
